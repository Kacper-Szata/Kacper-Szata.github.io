<!doctype html>

<html lang="en">

<title>Test Form</title>

<head>
    <meta charset="utf-8">
    <title>The Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="HTML5 GameLoop Template">
    <meta name="author" content="UI Programming">
    <script>

        function ValidateForm()
        {
            var x = document.forms["helloform"]["name"].value;
            
            if(x=="")
            {
                alert("I need to know your name");
                return false;
            }
            else
            {
                alert("Hello there " + document.forms["helloform"]["name"].value);
            }
        }
    
    </script>
    <!--StyleSheet-->
    <link rel="stylesheet" href="./css/style.css">
    <link href='https://fonts.googleapis.com/css?family=Orbitron' rel='stylesheet' type='text/css'>
    
</head>

<body>
  
<form action="https://kacper-szata.github.io/GameLoop/" method="GET" target="_blank">
            


<form name="helloform" action="." onsubmit="return ValidateForm()" method="get">
    Username: <input type="text" name="name">
    

    <input type="submit" value="Submit">
</form>

</body>

    <script src="./js/script.js"></script>
